<!DOCTYPE html>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <style>
    :root{
      --bg:#FFF4F7;
      --bg-2:#FFE9F1;
      --surface:#FFFFFF;
      --surface-2:#FFF3F8;
      --border:#FFD6E5;
      --text:#6B4E5C;
    --text-muted:#9B7C90;
    --text-dim:#C7A9BC;
          --gold:#FFAE5C;
          --gold-dim:#FFD9A8;
          --silver:#B8C2E8;
          --bronze:#F0A57E;
          --coral:#F2597E;
          --teal:#34B88C;
    --radius:22px;
}
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
        background:radial-gradient(120% 100% at 50% -10%, #FFEEF4 0%, var(--bg) 55%, var(--bg-2) 100%);
        color:var(--text);

    min-height:100vh;
    padding-bottom:100px;
}

  .num{ font-family:'Baloo 2', sans-serif; font-weight:700; }

  /* ---------- Header ---------- */
  header{
        padding:28px 20px 18px;
    display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:20;
    background:linear-gradient(180deg, rgba(255,244,247,0.97) 60%, rgba(255,244,247,0));

}
  .brand{ display:flex; flex-direction:column; gap:2px; }

    font-family:'Baloo 2', sans-serif; font-weight:700; font-size:22px;

  .icon-btn{

}

  /* ---------- Section title ---------- */

}

  /* ---------- FAB ---------- */
  .fab{
        position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:var(--gold); color:#fff;
        font-family:'Baloo 2', sans-serif; font-weight:700; letter-spacing:0.01em;

  }

  /* ---------- Modal ---------- */

        position:fixed; inset:0; background:rgba(6,10,9,0.72); backdrop-filter:blur(3px);

}
  @keyframes fadeIn{ from{opacity:0;} to{opacity:1;} }
  .sheet{
    background:var(--surface); border:1px solid var(--border);

  .sheet h2{ font-family:'Baloo 2', sans-serif; font-size:20px; margin-bottom:16px; }
  .sheet .close{ position:absolute; }
  .field{ margin-bottom:14px; }
  .field label{ font-size:12px; color:var(--text-muted); display:block; margin-bottom:6px; font-weight:600; }
  .field input, .field textarea, .field select{
        width:100%; background:var(--surface-2); border:1.5px solid var(--border);
    border-radius:14px; padding:11px 13px; color:var(--text); font-size:14.5px;
}
  .field input:focus, .field textarea:focus{ border-color:var(--coral); }
  .field textarea{ resize:none; min-height:60px; }
  .weight-input{ display:flex; align-items:center; gap:8px; }
  .weight-input input{ font-family:'Baloo 2', sans-serif; font-size:26px; font-weight:700; text-align:center; }
  .weight-input .unit{ color:var(--text-muted); font-size:14px; }
  .emoji-pick{ display:flex; flex-wrap:wrap; gap:8px; }
  .emoji-pick button{

}
  .emoji-pick button:hover{ transform:translateY(-2px) scale(1.05); }
  .emoji-pick button.sel{ border-color:var(--gold); background:rgba(255,174,92,0.18); }
  .primary-btn{
        width:100%; background:var(--gold); color:#FFFFFF; padding:14px; border-radius:16px;
      font-weight:700; font-size:15px; margin-top:6px; font-family:'Baloo 2', sans-serif;
    box-shadow:0 4px 0 var(--bronze); transition:transform .1s ease;
}
  .primary-btn:active{ transform:translateY(3px); box-shadow:0 1px 0 var(--bronze); }
  .secondary-btn{
        width:100%; background:var(--surface-2); color:var(--text-muted); padding:12px; border-radius:16px;
    font-weight:700; font-size:13.5px; margin-top:6px; border:1.5px solid var(--border);
}
  .danger-btn{ color:#D63763; border-color:var(--coral); background:#FFF0F3; }
      .member-mini-list{ display:flex; flex-direction:column; gap:8px; margin-bottom:16px; }
  .member-mini{
        display:flex; align-items:center; gap:10px; background:var(--surface-2);
    border:1.5px solid var(--border); border-radius:14px; padding:9px 12px; font-size:13.5px;
}
  .member-mini button{ margin-left:auto; color:#D63763; font-size:12px; font-weight:700; }
    .id-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:18px; }
  .id-card{
        background:var(--surface); border:1.5px solid var(--border); border-radius:18px;
    padding:16px 8px; text-align:center; font-size:12.5px; font-weight:700;
    display:flex; flex-direction:column; align-items:center; gap:6px;
    transition:border-color .15s ease, transform .1s ease;
    box-shadow:0 3px 0 var(--border);
}
  .id-card:hover{ border-color:var(--coral); transform:translateY(-2px); }
  .id-card .em{ font-size:28px; }
  .center-wrap{ min-height:70vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:20px; }
  .center-wrap .big-title{ font-family:'Baloo 2', sans-serif; font-size:26px; color:var(--gold); margin-bottom:8px; }
  .center-wrap p{ color:var(--text-muted); font-size:13.5px; max-width:320px; line-height:1.6; margin-bottom:22px; }
  .add-row-btn{
        width:100%; border:1px dashed var(--border); border-radius:12px; padding:12px;
    color:var(--text-muted); font-size:13px; font-weight:600; margin-bottom:16px;
}
  .add-row-btn:hover{ border-color:var(--gold); color:var(--gold); }
  .row{ cursor:pointer; }
  .chevron{ color:var(--text-dim); font-size:20px; flex-shrink:0; }
  .detail-list{ display:flex; flex-direction:column; gap:6px; max-height:220px; overflow-y:auto; }
  .detail-row{ display:flex; align-items:center; gap:10px; background:var(--surface-2); border:1px solid var(--border); border-radius:10px; padding:8px 12px; font-size:12.5px; }
  .detail-row .dd-date{ color:var(--text-muted); width:46px; flex-shrink:0; }
  .detail-row .dd-weight{ font-weight:700; flex:1; }
  /* ---------- Calendar view ---------- */
  .cal-nav{ display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .cal-nav button{
        width:32px; height:32px; border-radius:50%; background:var(--surface-2);
    border:1.5px solid var(--border); font-size:15px; font-weight:700; color:var(--text-muted);
    transition:transform .1s ease, border-color .15s ease;
}
  .cal-nav button:hover{ border-color:var(--coral); color:var(--coral); transform:translateY(-1px); }
  .cal-month-label{ font-family:'Baloo 2', sans-serif; font-weight:700; font-size:15px; text-align:center; }
  .cal-grid{ display:grid; grid-template-columns:repeat(7, 1fr); gap:5px; }
  .cal-weekday{ text-align:center; font-size:10.5px; font-weight:700; color:var(--text-dim); padding-bottom:4px; }
  .cal-cell{
        aspect-ratio:1; border-radius:10px; background:var(--surface-2);
    border:1.5px solid var(--border);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px;
}
  .cal-cell.cal-blank{ background:transparent; border-color:transparent; }
  .cal-cell.today{ border-color:var(--gold); border-width:2px; }
  .cal-cell.has-data{ cursor:pointer; transition:transform .1s ease; }
  .cal-cell.has-data:hover{ transform:scale(1.06); }
  .cal-cell.has-data.loss{ background:#E8FBF3; border-color:var(--teal); }
    .cal-cell.has-data.gain{ background:#FFEEF2; border-color:var(--coral); }
    .cal-day{ font-size:9.5px; color:var(--text-dim); }
  .cal-cell.has-data .cal-day{ color:var(--text-muted); }
  .cal-weight{ font-family:'Baloo 2', sans-serif; font-weight:700; font-size:11.5px; color:var(--text); }
  .cal-legend{ display:flex; align-items:center; gap:14px; margin-top:12px; font-size:11px; color:var(--text-muted); }

  .cal-legend .dot.loss{ background:var(--teal); }
  .cal-legend .dot.gain{ background:var(--coral); }
  .loading-dot{ display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--gold); animation:pulse 1s infinite ease-in-out; }
  @keyframes pulse{ 0%,100%{opacity:.3;} 50%{opacity:1;} }
  @media (prefers-reduced-motion: reduce){
        *{ animation:none !important; transition:none !important; }
}
</style>

  <body>
  <div id="app"></div>
  <script>
  (function(){
    "use strict";
  const REACTIONS = ['👏','🔥','💪','😂','😭'];
  const AVATARS = ['🐯','🐼','🦊','🐸','🐻','🐨','🦁','🐰','🐷','🦉','🐢','🦄','🐔','🐵'];
  let state = {
    members: [],
    checkins: [],
    currentUserId: null,
    rankMode: 'change',
        view: 'loading',
        setupDraft: [],
        setupForm: { name:'', emoji:AVATARS[0], start:'', target:'' },
        expandedFeedCount: 8
    };

  // ---------- Firebase setup ----------
  // 👉 把下面這個物件換成你自己 Firebase 專案的設定值(在 Firebase 主控台 → 專案設定 → 一般 → 你的應用程式 找到)
  const firebaseConfig = {
        apiKey: "AIzaSyAi4E5kk5pqPOAIx350JB0rkONynuGpGKw",
              authDomain: "weight-tracker-525e9.firebaseapp.com",
              projectId: "weight-tracker-525e9",
              storageBucket: "weight-tracker-525e9.firebasestorage.app",
              messagingSenderId: "169473363753",
              appId: "1:169473363753:web:06b555049c2727abcd7138"
          };
  function isFirebaseConfigured(){
        return firebaseConfig.apiKey && firebaseConfig.apiKey !== "YOUR_API_KEY";
  }
  let db = null, membersDocRef = null, checkinsDocRef = null;
  let membersLoaded = false, checkinsLoaded = false;
  // ---------- personal device identity (works both inside Claude artifact preview & standalone deployment) ----------
  async function getLocalIdentity(){
    if(window.storage){
      try{ const r = await window.storage.get('currentUserId', false); return r ? JSON.parse(r.value) : null; }catch(e){ return null; }
    }
    try{ const v = localStorage.getItem('currentUserId'); return v ? JSON.parse(v) : null; }catch(e){ return null; }
  }
  async function setLocalIdentity(id){
    if(window.storage){
      try{ await window.storage.set('currentUserId', JSON.stringify(id), false); }catch(e){ console.error(e); }
      return;
    }
    try{ localStorage.setItem('currentUserId', JSON.stringify(id)); }catch(e){ console.error(e); }
  }
  // ---------- shared data (members / checkins) via Firestore ----------
  async function saveMembers(){
    try{ await membersDocRef.set({ list: state.members }); }
          catch(e){ console.error('saveMembers failed', e); alert('存檔失敗,請檢查網路連線或 Firebase 設定'); }
  }
  async function saveCheckins(){
    try{ await checkinsDocRef.set({ list: state.checkins }); }
          catch(e){ console.error('saveCheckins failed', e); alert('存檔失敗,請檢查網路連線或 Firebase 設定'); }
  }
  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
  function todayStr(){ return new Date().toISOString().slice(0,10); }
  function fmtTime(ts){
        const d = new Date(ts);
    const now = new Date();
    const diffH = (now-d)/3600000;
    if(diffH < 1) return Math.max(1,Math.round(diffH*60))+'分鐘前';
    if(diffH < 24) return Math.round(diffH)+'小時前';
    return (d.getMonth()+1)+'/'+d.getDate();
  }
  function memberById(id){ return state.members.find(m=>m.id===id); }
  function memberStats(m){
        const own = state.checkins.filter(c=>c.memberId===m.id).sort((a,b)=>a.date.localeCompare(b.date));
    const latest = own.length ? own[own.length-1].weight : m.start;
    const change = +(m.start - latest).toFixed(1); // positive = lost
    const totalToLose = m.start - m.target;
    let progress = 0;
    if(totalToLose !== 0){
      progress = Math.max(0, Math.min(100, (change/totalToLose)*100));
    }
    // streak
    const dateSet = new Set(own.map(c=>c.date));
    let streak = 0;
    let cursor = new Date();
    if(!dateSet.has(todayStr())) cursor.setDate(cursor.getDate()-1);
    while(true){
      const ds = cursor.toISOString().slice(0,10);
      if(dateSet.has(ds)){ streak++; cursor.setDate(cursor.getDate()-1); }
      else break;
    }
    return { latest, change, progress, streak, hasData: own.length>0 };
  }

  function renderMain(){

  function renderFeedCard(c){
    const m = memberById(c.memberId);
    if(!m) return '';
    const stats = memberStats(m);
    const own = state.checkins.filter(x=>x.memberId===c.memberId).sort((a,b)=>a.date.localeCompare(b.date));
    const idx = own.findIndex(x=>x.id===c.id);
    const prevWeight = idx>0 ? own[idx-1].weight : m.start;
    const d = +(prevWeight - c.weight).toFixed(1);
    const dCls = d>=0 ? 'loss':'gain';
    const dTxt = d===0 ? '持平' : (d>0?'-':'+')+Math.abs(d).toFixed(1)+'kg';
    const rxCounts = {};
    (c.reactions||[]).forEach(r => rxCounts[r.emoji] = (rxCounts[r.emoji]||0)+1);
    const myReactions = new Set((c.reactions||[]).filter(r=>r.memberId===state.currentUserId).map(r=>r.emoji));
    const rxHtml = REACTIONS.map(e => {
      const n = rxCounts[e]||0;
      const mine = myReactions.has(e);
      return `<button class="rx-btn ${mine?'mine':''}" data-rx="${c.id}|${e}">${e}${n?`<span class="n">${n}</span>`:''}</button>`;
}).join('');
    const commentsHtml = (c.comments||[]).map(cm => {
      const cm_m = memberById(cm.memberId);
      const cmIsMine = cm.memberId === state.currentUserId;
      return `<div class="comment">
        <b>${cm_m?escapeHtml(cm_m.name):'?'}:</b><span>${escapeHtml(cm.text)}</span>
        ${cmIsMine ? `<button class="comment-edit-btn" data-edit-comment="${c.id}|${cm.id}">✏️</button><button class="comment-edit-btn" data-delete-comment="${c.id}|${cm.id}">🗑️</button>` : ''}
      </div>`;
}).join('');
    const isMine = c.memberId === state.currentUserId;
    return `
      <div class="feed-card">
        <div class="feed-head">
          <div class="avatar" style="width:32px;height:32px;font-size:15px;">${m.emoji}</div>
          <div class="fname">${escapeHtml(m.name)}</div>
          <div class="ftime">${fmtTime(c.timestamp)}</div>
          ${isMine ? `<button class="edit-btn" data-edit-checkin="${c.id}">✏️</button>` : ''}
        </div>
        <div class="feed-weight">
          ${c.weight.toFixed(1)}<span style="font-size:13px;color:var(--text-dim)">kg</span>
          <span class="delta-chip ${dCls}">${dTxt}</span>
        </div>
        ${c.note ? `<div class="feed-note">「${escapeHtml(c.note)}」</div>` : ''}
        <div class="reactions">${rxHtml}</div>
        <div class="comments">
          ${commentsHtml}
          <div class="comment-form">
            <input type="text" placeholder="留言鼓勵一下..." data-comment-input="${c.id}" maxlength="80">
            <button data-comment-submit="${c.id}">送出</button>
          </div>
        </div>
      </div>
    `;
}

  // ---------- MEMBER DETAIL / TREND CHART MODAL ----------
  function formatShortDate(dateStr){
    const d = new Date(dateStr+'T00:00:00');
    return (d.getMonth()+1)+'/'+d.getDate();
}
  function buildChartSVG(entries, m){
    const w=520, h=170, padL=10, padR=10, padT=18, padB=8;
    const weights = entries.map(e=>e.weight);
    let minW = Math.min(...weights, m.target);
    let maxW = Math.max(...weights, m.start);
    if(minW===maxW){ minW-=1; maxW+=1; }
    const margin = (maxW-minW)*0.15 || 1;
    minW -= margin; maxW += margin;
    const innerW = w-padL-padR, innerH = h-padT-padB;
    const xFor = (i) => entries.length===1 ? padL+innerW/2 : padL + (i/(entries.length-1))*innerW;
    const yFor = (val) => padT + innerH - ((val-minW)/(maxW-minW))*innerH;
    const points = entries.map((e,i)=>`${xFor(i).toFixed(1)},${yFor(e.weight).toFixed(1)}`).join(' ');
    const areaPoints = `${xFor(0).toFixed(1)},${(padT+innerH).toFixed(1)} ${points} ${xFor(entries.length-1).toFixed(1)},${(padT+innerH).toFixed(1)}`;
    const targetY = yFor(m.target);
    const dots = entries.map((e,i)=>`<circle cx="${xFor(i).toFixed(1)}" cy="${yFor(e.weight).toFixed(1)}" r="3.5" fill="var(--gold)" stroke="#FFFFFF" stroke-width="1.5"/>`).join('');
    return `
      <div style="background:var(--surface-2); border:1px solid var(--border); border-radius:14px; padding:14px 10px 6px; margin-top:4px;">
        <svg viewBox="0 0 ${w} ${h}" width="100%" style="display:block; overflow:visible;">
          <line x1="${padL}" y1="${targetY.toFixed(1)}" x2="${w-padR}" y2="${targetY.toFixed(1)}" stroke="var(--teal)" stroke-width="1" stroke-dasharray="4 4" />
          <text x="${w-padR}" y="${(targetY-6).toFixed(1)}" text-anchor="end" font-size="10" fill="var(--teal)" font-family="Baloo 2, sans-serif">目標 ${m.target}kg</text>
          <polygon points="${areaPoints}" fill="var(--gold)" opacity="0.08" />
          <polyline points="${points}" fill="none" stroke="var(--gold)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
          ${dots}
        </svg>
        <div style="display:flex; justify-content:space-between; font-size:10.5px; color:var(--text-dim); font-family:'Baloo 2', sans-serif; padding:0 2px; margin-top:2px;">
          <span>${formatShortDate(entries[0].date)}</span><span>${formatShortDate(entries[entries.length-1].date)}</span>
        </div>
      </div>
    `;
}

  function buildChartSection(m, range){
    const own = state.checkins.filter(c=>c.memberId===m.id).sort((a,b)=>a.date.localeCompare(b.date));
    let entries = own;
    if(range !== 'all'){
      const cutoff = new Date();
      cutoff.setDate(cutoff.getDate() - (range-1));
      const cutoffStr = cutoff.toISOString().slice(0,10);
      entries = own.filter(c => c.date >= cutoffStr);
}
    const chart = entries.length >= 1
      ? buildChartSVG(entries, m)
      : `<div class="empty" style="margin-top:6px;"><span class="big">📉</span>這段期間還沒有紀錄</div>`;
    const isMine = m.id === state.currentUserId;
    const listHtml = entries.length ? [...entries].reverse().map(c => {
      const ownIdx = own.findIndex(x=>x.id===c.id);
      const prev = ownIdx>0 ? own[ownIdx-1].weight : m.start;
      const d = +(prev - c.weight).toFixed(1);
      const cls = d>=0 ? 'loss' : 'gain';
      const txt = d===0 ? '持平' : (d>0?'-':'+')+Math.abs(d).toFixed(1)+'kg';
      return `<div class="detail-row" ${isMine?`data-edit-checkin="${c.id}" style="cursor:pointer;"`:''}>
        <span class="dd-date num">${formatShortDate(c.date)}</span>
        <span class="dd-weight num">${c.weight.toFixed(1)}kg</span>
        <span class="delta-chip ${cls}">${txt}</span>
        ${isMine ? `<span style="font-size:12px; opacity:0.6;">✏️</span>` : ''}
      </div>`;
}).join('') : '';
    return `
      <div class="tabs" style="margin-bottom:14px;">
        <div class="tab ${range===7?'active':''}" data-range="7">7天</div>
        <div class="tab ${range===30?'active':''}" data-range="30">30天</div>
        <div class="tab ${range==='all'?'active':''}" data-range="all">全部</div>
      </div>
      ${chart}
      ${listHtml ? `<div class="section-title" style="margin-top:20px;">紀錄明細</div><div class="detail-list">${listHtml}</div>` : ''}
    `;
}

  const WEEKDAY_LABELS = ['日','一','二','三','四','五','六'];
  function buildCalendarSection(m, monthDate){
    const own = state.checkins.filter(c=>c.memberId===m.id).sort((a,b)=>a.date.localeCompare(b.date));
    const byDate = {};
    own.forEach(c => byDate[c.date] = c);
    const isMine = m.id === state.currentUserId;
    const year = monthDate.getFullYear();
    const month = monthDate.getMonth();
    const firstWeekday = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month+1, 0).getDate();
    const monthCount = own.filter(c => c.date.slice(0,7) === `${year}-${String(month+1).padStart(2,'0')}`).length;
    let cells = '';
    for(let i=0;i<firstWeekday;i++) cells += `<div class="cal-cell cal-blank"></div>`;
    for(let d=1; d<=daysInMonth; d++){
      const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const entry = byDate[dateStr];
      const isToday = dateStr === todayStr();
      if(entry){
        const ownIdx = own.findIndex(x=>x.id===entry.id);
        const prev = ownIdx>0 ? own[ownIdx-1].weight : m.start;
        const delta = +(prev - entry.weight).toFixed(1);
        const cls = delta >= 0 ? 'loss' : 'gain';
        cells += `<div class="cal-cell has-data ${cls} ${isToday?'today':''}" ${isMine?`data-edit-checkin="${entry.id}"`:''}>
          <span class="cal-day">${d}</span>
          <span class="cal-weight">${entry.weight.toFixed(1)}</span>
        </div>`;
}else{
        cells += `<div class="cal-cell ${isToday?'today':''}"><span class="cal-day">${d}</span></div>`;
}
}
    const weekdayHtml = WEEKDAY_LABELS.map(w => `<div class="cal-weekday">${w}</div>`).join('');
    return `
      <div class="cal-nav">
        <button data-cal-nav="-1">‹</button>
        <div class="cal-month-label">${year}年${month+1}月 <span style="font-size:11px; color:var(--text-muted); font-weight:600;">(${monthCount}天打卡)</span></div>
        <button data-cal-nav="1">›</button>
      </div>
      <div class="cal-grid">${weekdayHtml}${cells}</div>
      <div class="cal-legend">
        <span><i class="dot loss"></i>變輕</span>
        <span><i class="dot gain"></i>變重</span>
        ${isMine ? '<span style="margin-left:auto; color:var(--text-dim);">點格子可修改</span>' : ''}
      </div>
    `;
}


      function buildDetailContent(m, viewMode, range, monthDate){
            return `
                  <h2>${m.emoji} ${escapeHtml(m.name)} 的體重紀錄</h2>
                        <div class="tabs" style="margin-bottom:14px;">
                                <div class="tab ${viewMode==='chart'?'active':''}" data-view="chart">📈 曲線圖</div>
                                        <div class="tab ${viewMode==='calendar'?'active':''}" data-view="calendar">🗓️ 月曆</div>
                                              </div>
                                                    ${viewMode==='chart' ? buildChartSection(m, range) : buildCalendarSection(m, monthDate)}
                                                          <button class="secondary-btn" id="detail-close" style="margin-top:16px;">關閉</button>
                                                              `;
      }

      function openMemberDetailModal(memberId){
            const m = memberById(memberId);
            if(!m) return;
            let viewMode = 'chart';
            let range = 7;
            let monthDate = new Date(new Date().getFullYear(), new Date().getMonth(), 1);
            const overlay = document.createElement('div');
            overlay.className = 'overlay';
            overlay.innerHTML = `<div class="sheet" id="detail-sheet"></div>`;
            document.body.appendChild(overlay);
            overlay.addEventListener('click', e => { if(e.target===overlay) overlay.remove(); });
            function draw(){
                    document.getElementById('detail-sheet').innerHTML = buildDetailContent(m, viewMode, range, monthDate);
                    document.querySelectorAll('[data-view]').forEach(btn=>{
                              btn.onclick = () => { viewMode = btn.getAttribute('data-view'); draw(); };
                    });
                    document.querySelectorAll('[data-range]').forEach(btn=>{
                              btn.onclick = () => {
                                          const v = btn.getAttribute('data-range');
                                          range = v === 'all' ? 'all' : parseInt(v);
                                          draw();
                              };
                    });
                    document.querySelectorAll('[data-cal-nav]').forEach(btn=>{
                              btn.onclick = () => {
                                          const dir = parseInt(btn.getAttribute('data-cal-nav'));
                                          monthDate = new Date(monthDate.getFullYear(), monthDate.getMonth()+dir, 1);
                                          draw();
                              };
                    });
                    document.querySelectorAll('[data-edit-checkin]').forEach(row=>{
                              row.onclick = () => openEditCheckinModal(row.getAttribute('data-edit-checkin'), draw);
                    });
                    document.getElementById('detail-close').onclick = () => overlay.remove();
            }
            draw();
      }

      function openSwitchIdentityWarning(){
            const me = memberById(state.currentUserId);
            const overlay = document.createElement('div');
            overlay.className = 'overlay';
            overlay.innerHTML = `
                  <div class="sheet">
                          <h2>⚠️ 確定要切換身份嗎?</h2>
                                  <div style="background:#FFF0F3; border:1.5px solid var(--coral); border-radius:14px; padding:14px; font-size:13px; color:var(--text); line-height:1.7; margin-bottom:16px;">
                                            目前這台裝置是 <b>${me?escapeHtml(me.name):'未知'}</b>。切換之後:
                                                      <br>• 打卡、排行榜都會變成算在<b>新身份</b>頭上
                                                                <br>• 你將可以修改或刪除<b>新身份</b>的紀錄
                                                                          <br>• 請確認真的是本人操作,才不會不小心動到別人的資料
                                                                                  </div>
                                                                                          <button class="primary-btn" id="sw-confirm">我了解,繼續切換</button>
                                                                                                  <button class="secondary-btn" id="sw-cancel">取消,保持現在身份</button>
                                                                                                        </div>
                                                                                                            `;
            document.body.appendChild(overlay);
            overlay.addEventListener('click', e => { if(e.target===overlay) overlay.remove(); });
            document.getElementById('sw-cancel').onclick = () => overlay.remove();
            document.getElementById('sw-confirm').onclick = () => {
                    overlay.remove();
                    state.currentUserId = null;
                    state.view = 'identify';
                    render();
            };
      }

      function openResetDataWarning(){
            const memberCount = state.members.length;
            const checkinCount = state.checkins.length;
            const overlay = document.createElement('div');
            overlay.className = 'overlay';
            overlay.innerHTML = `
                  <div class="sheet">
                          <h2>🚨 真的要重置所有資料嗎?</h2>
                                  <div style="background:#FFF0F3; border:1.5px solid var(--coral); border-radius:14px; padding:14px; font-size:13px; color:var(--text); line-height:1.7; margin-bottom:16px;">
                                            這會<b>一次清空全部人</b>的資料,不是只清你自己的:
                                                      <br>• 全部 <b>${memberCount}</b> 位成員名單
                                                                <br>• 全部 <b>${checkinCount}</b> 筆打卡、留言、emoji 反應
                                                                          <br>• 每個人裝置記住的身份
                                                                                    <br><br>清空後<b>無法復原</b>,大家的紀錄都會消失。
                                                                                            </div>
                                                                                                    <div class="field">
                                                                                                              <label>請輸入「<b>清空</b>」兩個字以確認</label>
                                                                                                                        <input type="text" id="rs-confirm-input" placeholder="清空">
    </div>
            <button class="primary-btn" id="rs-confirm" style="background:var(--coral); color:#FFFFFF; box-shadow:0 4px 0 #D63763;">確定清空全部資料</button>
                    <button class="secondary-btn" id="rs-cancel">取消,先不要</button>
                          </div>
                              `;
            document.body.appendChild(overlay);
            overlay.addEventListener('click', e => { if(e.target===overlay) overlay.remove(); });
            document.getElementById('rs-cancel').onclick = () => overlay.remove();
            document.getElementById('rs-confirm').onclick = async () => {
                    const val = document.getElementById('rs-confirm-input').value.trim();
                    if(val !== '清空'){ alert('請輸入「清空」兩個字才能確認唷'); return; }
                    state.members = [];
                    state.checkins = [];
                    state.currentUserId = null;
                    await saveMembers();
                    await saveCheckins();
                    overlay.remove();
                    determineView();
                    render();
            };
      }

      function openMenuModal(){
            const overlay = document.createElement('div');
            overlay.className = 'overlay';
            overlay.innerHTML = `
                  <div class="sheet">
                          <h2>⚙️ 設定</h2>
                                  <button class="secondary-btn" id="mn-goal">🎯 修改我的目標</button>
                                          <button class="secondary-btn" id="mn-switch">🙋 切換身份</button>
                                                  <button class="secondary-btn" id="mn-add">➕ 新增好友</button>
                                                          <button class="secondary-btn danger-btn" id="mn-reset">🗑️ 重置所有資料</button>
                                                                  <button class="secondary-btn" id="mn-close" style="margin-top:14px;">關閉</button>
                                                                        </div>
                                                                            `;
            document.body.appendChild(overlay);
            overlay.addEventListener('click', e => { if(e.target===overlay) overlay.remove(); });
            document.getElementById('mn-close').onclick = () => overlay.remove();
            document.getElementById('mn-goal').onclick = () => {
                    overlay.remove();
                    openEditGoalModal();
            };
            document.getElementById('mn-switch').onclick = () => {
                    overlay.remove();
                    openSwitchIdentityWarning();
            };
            document.getElementById('mn-add').onclick = () => {
                    overlay.remove();
                    openAddMemberModal();
            };
            document.getElementById('mn-reset').onclick = () => {
                    overlay.remove();
                    openResetDataWarning();
            };
      }

      function openEditGoalModal(){
            const me = memberById(state.currentUserId);
            if(!me){ alert('找不到你的身份,請先切換身份'); return; }
            let form = { name: me.name, emoji: me.emoji, start: me.start, target: me.target };
            const overlay = document.createElement('div');
            overlay.className = 'overlay';
            const emojiPicks = () => AVATARS.map(e => `<button data-pick="${e}" class="${form.emoji===e?'sel':''}">${e}</button>`).join('');
            overlay.innerHTML = `
                  <div class="sheet">
                          <h2>🎯 修改我的目標</h2>
                                  <div class="field"><label>暱稱</label><input type="text" id="eg-name" maxlength="10" value="${escapeHtml(form.name)}"></div>
                                          <div class="field"><label>選個代表動物</label><div class="emoji-pick" id="eg-emoji">${emojiPicks()}</div></div>
                                                  <div class="field"><label>起始體重 (kg)</label><input type="number" step="0.1" id="eg-start" value="${form.start}"></div>
                                                          <div class="field"><label>目標體重 (kg)</label><input type="number" step="0.1" id="eg-target" value="${form.target}"></div>
                                                                  <p style="font-size:11.5px; color:var(--text-dim); margin:-6px 0 14px; line-height:1.6;">
                                                                            提醒:調整「起始體重」會連動影響排行榜上的累計減重與達標率計算,但不會動到你已經打卡的歷史紀錄。
                                                                                    </p>
                                                                                            <button class="primary-btn" id="eg-submit">儲存修改</button>
                                                                                                    <button class="secondary-btn" id="eg-cancel">取消</button>
                                                                                                          </div>
                                                                                                              `;
            document.body.appendChild(overlay);
            overlay.addEventListener('click', e => { if(e.target===overlay) overlay.remove(); });
            document.getElementById('eg-cancel').onclick = () => overlay.remove();
            function rebindEmojiPicks(){
                    overlay.querySelectorAll('[data-pick]').forEach(btn=>{
                              btn.onclick = () => {
                                          form.emoji = btn.getAttribute('data-pick');
                                          document.getElementById('eg-emoji').innerHTML = emojiPicks();
                                          rebindEmojiPicks();
                              };
                    });
            }
            rebindEmojiPicks();
            document.getElementById('eg-submit').onclick = async () => {
                    const name = document.getElementById('eg-name').value.trim();
                    const start = parseFloat(document.getElementById('eg-start').value);
                    const target = parseFloat(document.getElementById('eg-target').value);
                    if(!name || isNaN(start) || isNaN(target)){ alert('請填寫完整資訊'); return; }
                    me.name = name; me.emoji = form.emoji; me.start = start; me.target = target;
                    await saveMembers();
                    overlay.remove();
                    render();
            };
      }

      function openAddMemberModal(){
            let form = { name:'', emoji:AVATARS[state.members.length % AVATARS.length], start:'', target:'' };
            const overlay = document.createElement('div');
            overlay.className = 'overlay';
            const emojiPicks = () => AVATARS.map(e => `<button data-pick="${e}" class="${form.emoji===e?'sel':''}">${e}</button>`).join('');
            overlay.innerHTML = `
                  <div class="sheet">
                          <h2>➕ 新增好朋友</h2>
                                  <div class="field"><label>暱稱</label><input type="text" id="am-name" maxlength="10"></div>
                                          <div class="field"><label>選個代表動物</label><div class="emoji-pick" id="am-emoji">${emojiPicks()}</div></div>
                                                  <div class="field"><label>起始體重 (kg)</label><input type="number" step="0.1" id="am-start"></div>
                                                          <div class="field"><label>目標體重 (kg)</label><input type="number" step="0.1" id="am-target"></div>
                                                                  <button class="primary-btn" id="am-submit">加入我們</button>
                                                                          <button class="secondary-btn" id="am-cancel">取消</button>
                                                                                </div>
                                                                                    `;
            document.body.appendChild(overlay);
            overlay.addEventListener('click', e => { if(e.target===overlay) overlay.remove(); });
            document.getElementById('am-cancel').onclick = () => overlay.remove();
            function rebindEmojiPicks(){
                    overlay.querySelectorAll('[data-pick]').forEach(btn=>{
                              btn.onclick = () => {
                                          form.emoji = btn.getAttribute('data-pick');
                                          document.getElementById('am-emoji').innerHTML = emojiPicks();
                                          rebindEmojiPicks();
                              };
                    });
            }
            rebindEmojiPicks();
            document.getElementById('am-submit').onclick = async () => {
                    const name = document.getElementById('am-name').value.trim();
                    const start = parseFloat(document.getElementById('am-start').value);
                    const target = parseFloat(document.getElementById('am-target').value);
                    if(!name || isNaN(start) || isNaN(target)){ alert('請填寫完整資訊'); return; }
                    state.members.push({ id: uid(), name, emoji: form.emoji, start, target });
                    await saveMembers();
                    overlay.remove();
                    render();
            };
      }

      function escapeHtml(str){
            return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
      }

      function afterDataChange(){
            if(!membersLoaded || !checkinsLoaded) return;
            determineView();
            render();
      }

      function startListening(){
            membersDocRef.onSnapshot(snap => {
                    state.members = (snap.exists && snap.data().list) ? snap.data().list : [];
                    membersLoaded = true;
                    afterDataChange();
            }, err => {
                    console.error('members listener error', err);
                    state.view = 'firebase-error';
                    render();
            });
            checkinsDocRef.onSnapshot(snap => {
                    state.checkins = (snap.exists && snap.data().list) ? snap.data().list : [];
                    checkinsLoaded = true;
                    afterDataChange();
            }, err => {
                    console.error('checkins listener error', err);
                    state.view = 'firebase-error';
                    render();
            });
      }

      async function init(){
            render();
            state.currentUserId = await getLocalIdentity();
            if(!isFirebaseConfigured()){
                    state.view = 'config-needed';
                    render();
                    return;
            }
            try{
                    firebase.initializeApp(firebaseConfig);
                    db = firebase.firestore();
                    db.settings({ experimentalAutoDetectLongPolling: true, useFetchStreams: false });
                    membersDocRef = db.collection('appData').doc('members');
                    checkinsDocRef = db.collection('appData').doc('checkins');
                    startListening();
            }catch(e){
                    console.error('firebase init failed', e);
                    state.view = 'firebase-error';
                    render();
            }
      }

      init();
    })();
</script>
